default_language_version:
  node: 25.2.1
  python: python3.12
exclude: |
  (?x)(
    ^agents/|
    /protos/|
    ^docker/model_specific/cfg_parallel_state\.py$
  )
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.0.1
    hooks:
      - id: trailing-whitespace
        exclude_types: [python]
        exclude: ^tests/.*/fixtures/.*
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        exclude_types: [python]
        exclude: ^tests/.*/fixtures/.*
      - id: check-symlinks
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.7
    hooks:
      - alias: ruff-check-only
        id: ruff-check
        stages: [manual]
      - alias: ruff-fix
        name: ruff fix
        id: ruff-check
        args: [
          "--fix",
          "--select",
          "I",
        ]
      - alias: ruff-noqa
        name: ruff noqa
        id: ruff-check
        args: [--add-noqa]
        stages: [manual]
      - id: ruff-format
  - repo: local
    hooks:
      - id: ty
        name: ty type check
        entry: ty check
        language: system
        types: [python]
        pass_filenames: false
