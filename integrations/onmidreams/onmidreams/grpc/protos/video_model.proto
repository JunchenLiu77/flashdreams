syntax = "proto3";

package onmidreams.video_model;

import "onmidreams/grpc/protos/common.proto";
import "onmidreams/grpc/protos/camera.proto";

service WorldModelService {
    rpc start_session(SessionRequest) returns (SessionId);
    rpc close_session(SessionCloseRequest) returns (common.Empty);
    rpc render_video_chunk(VideoChunkRequest) returns (VideoChunkReturn);
}

message StaticWorldMap {
	bytes hdmap_parquets = 1; // bytes of zip-compressed parquet files
}

message SessionId {
    string session_id = 1;
    common.Pose initial_ego_pose = 2;  // Initial ego pose for client to sync car position
}

enum ActorClassId {
    INVALID = 0;
    // TODO: make sure the taxonomy makes sense w.r.t. the hdmap renderer.
    CAR = 1;
    TRUCK = 2;
    PEDESTRIAN = 3;
    CYCLIST = 4;
    OTHER = 5;
}

message DynamicActor {
    ActorClassId class_id = 1;
    common.AABB bbox_dims = 2;
    common.Trajectory trajectory = 3; // contains a time range
}

message DynamicWorldState {
    repeated DynamicActor actors = 1;
    // TODO: traffic light states, etc
}

enum ImageFormat {
    UNDEFINED = 0;
    PNG = 1;
    JPEG = 2;
    // AlpaSim currently only supports PNG and JPEG.
    JPEG2000 = 3;
    RGB_UINT8_PLANAR = 4;
    AVC = 5;
    AV1 = 6;
}

message Image {
    bytes data = 1;
    ImageFormat format = 2;
}

// Text prompt for guiding video generation
message TextPrompt {
    string positive = 1;  // Positive prompt describing desired content
    string negative = 2;  // Negative prompt describing content to avoid
}

// Debug options for development and visualization
message DebugOptions {
    bool return_hdmap_frames = 1;  // Return rendered HD map condition frames
    bool return_bev_map = 2;       // Return bird's eye view map (if available)
    bool skip_video_generation = 3;  // Skip video model inference, only render HDMap (fast exploration mode)
    float bev_height_m = 4;  // Optional BEV camera height (meters). <=0 means server default.
    float bev_fov_deg = 5;   // Optional BEV camera vertical FOV (degrees). <=0 means server default.
}

message SessionRequest {
    reserved 2, 4;  // Removed: Image initial_frame, camera.CameraSpec ego_camera_spec
    StaticWorldMap static_world_map = 3;
    TextPrompt text_prompt = 5;  // Optional text prompt for generation
    int32 start_frame_offset = 6;  // Number of frames to skip from scene start (e.g., 30 = skip 1s at 30fps)
    DebugOptions debug_options = 7;      // Optional debug output options
    repeated camera.CameraSpec camera_specs = 8;  // One per view (includes rig_to_camera + intrinsics)
    repeated Image initial_frames = 9;            // One conditioning frame per view
    fixed64 random_seed = 10;  // Optional random seed for deterministic generation (0 = server chooses)
}

message SessionCloseRequest {
    string session_id = 1;
}

message VideoChunkRequest {
    SessionId session_id = 1;
	common.Trajectory rig_trajectory = 2;  // Ego rig trajectory (renamed from ego_camera_trajectory)
    DynamicWorldState dynamic_state = 3; // within requested time range
}

// Road surface state at a position (for realistic driving physics)
// Enables client to adjust car elevation, pitch, and roll to match road surface
message RoadState {
    float ground_z = 1;        // Ground elevation in world coordinates (meters)
    float pitch = 2;           // Road pitch angle (radians, positive = uphill)
    float roll = 3;            // Road banking/camber (radians, positive = left side higher)
    bool on_road = 4;          // Whether position is on a valid road surface
}

// Per-camera output frames
message CameraOutput {
    string camera_logical_id = 1;
    repeated Image rgb_frames = 2;
    repeated Image hdmap_condition_frames = 3;
}

message VideoChunkReturn {
    reserved 1, 3;  // Removed: flat rgb_frames, flat hdmap_condition_frames
    // this may match the requested trajectory or be interpolated,
    // hence we return and suggest the client uses these for further processing
	common.Trajectory poses_and_timestamps_of_frames = 2;

    // Road state for each frame pose - enables client to adjust car z/pitch/roll
    // to follow road surface (ramps, hills, banking). One entry per frame.
    repeated RoadState road_states = 4;

    // Per-camera output frames (replaces flat rgb_frames / hdmap_condition_frames)
    repeated CameraOutput camera_outputs = 5;

    // Optional bird's-eye-view map frames (one per generated timestamp).
    repeated Image bev_map_frames = 6;
}

// =============================================================================
// Session Recording/Replay
// =============================================================================

// Paired request/response for start_session RPC
message StartSessionEntry {
    SessionRequest request = 1;
    SessionId response = 2;
}

// Paired request/response for render_video_chunk RPC
message RenderVideoChunkEntry {
    VideoChunkRequest request = 1;
    VideoChunkReturn response = 2;
}

// Paired request/response for close_session RPC
message CloseSessionEntry {
    SessionCloseRequest request = 1;
    common.Empty response = 2;
}

// Log entry for recording gRPC sessions for replay and testing.
// Each entry captures a single RPC call with its request, response, and timing.
message LogEntry {
    uint64 seq = 1;                    // Sequence number within the recording
    uint64 timestamp_ns = 2;           // Wall clock when request was received
    uint64 duration_ns = 3;            // Time to process the request

    // RPC call (one of) - each variant contains a matched request/response pair
    oneof call {
        StartSessionEntry start_session = 10;
        RenderVideoChunkEntry render_video_chunk = 11;
        CloseSessionEntry close_session = 12;
    }
}
