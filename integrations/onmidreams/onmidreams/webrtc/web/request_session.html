<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Onmidreams WebRTC Drive</title>
  <link rel="stylesheet" href="/static/request_session.css">
</head>
<body data-status="idle">
  <main class="appShell">
    <section class="stage" aria-label="Onmidreams WebRTC Drive">
      <h1>Onmidreams Drive</h1>
      <video id="remoteVideo" class="stageVideo" autoplay playsinline muted></video>
      <div class="stageShade" aria-hidden="true"></div>

      <section class="statusPanel panel" aria-live="polite">
        <span class="panelLabel">Session</span>
        <div class="statusLine">
          <span class="statusDot" aria-hidden="true"></span>
          <strong id="statusText">Idle</strong>
        </div>
        <button id="connectButton" type="button">Connect</button>
        <div class="flowLine">
          <span>Flow</span>
          <strong id="flowText">waiting</strong>
        </div>
      </section>

      <section class="controlsPanel panel" aria-label="Driving controls">
        <span class="panelLabel">Drive</span>
        <div class="keyGrid">
          <button class="controlKey keyW" type="button" data-control-key="w" aria-label="Forward">W</button>
          <button class="controlKey keyA" type="button" data-control-key="a" aria-label="Turn left">A</button>
          <button class="controlKey keyS" type="button" data-control-key="s" aria-label="Reverse">S</button>
          <button class="controlKey keyD" type="button" data-control-key="d" aria-label="Turn right">D</button>
        </div>
      </section>

      <section class="logPanel panel" aria-label="Client logs">
        <span class="panelLabel">Log</span>
        <div id="eventLog" class="logList" aria-live="polite"></div>
      </section>

      <section class="metricsBar" aria-label="Session telemetry">
        <div class="metric"><span>FPS</span><strong id="fpsValue">--</strong></div>
        <div class="metric"><span>Latency</span><strong id="latencyValue">--</strong></div>
        <div class="metric"><span>Resolution</span><strong id="resolutionValue">--</strong></div>
        <div class="metric"><span>Step</span><strong id="stepValue">--</strong></div>
        <div class="metric metricWide"><span>Model</span><strong id="modelValue">Onmidreams</strong></div>
      </section>
    </section>
  </main>

  <script src="/static/request_session.js" type="module"></script>
</body>
</html>
