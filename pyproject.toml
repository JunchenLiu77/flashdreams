[tool.uv.workspace]
members = [
    "flashdreams",
    # Each populated subdir under ``integrations/`` is a standalone
    # external integration repo (e.g. ``causal_forcing`` / ``self_forcing``
    # plugins, ``omnidreams`` / ``lingbot`` integrations); empty stub
    # folders alongside them are intentional placeholders for future
    # extractions and don't ship a ``pyproject.toml`` yet.
    "integrations/*",
    # Nested sub-packages that the ``integrations/*`` glob does not reach.
    "integrations/omnidreams/ludus-renderer",
    "integrations/omnidreams/samples/interactive-drive",
]

# Override nvidia-cublas to >=13.4 because transformer-engine-cu13 2.14.0 was
# compiled against cuBLAS 13.4.x, while torch 2.11 pins nvidia-cublas 13.1.0.3.
# cuBLAS 13.4 is backwards compatible with 13.1.
[tool.uv]
managed = true
required-version = ">=0.11.8"
override-dependencies = [
    "nvidia-cublas>=13.4",
    # Keep transitive HTTP clients off urllib3 versions with sensitive-header
    # redirect handling vulnerabilities.
    "urllib3>=2.7.0",
    # Keep protobuf off the 6.33.x line flagged by BDSA for the ParseDict
    # recursion-depth follow-up.
    "protobuf>=7.35.0,<8",
]

# `transformer-engine-torch` has no prebuilt wheel and must be built against
# the project's PyTorch + system CUDA. uv's default per-package build isolation
# spins up a clean venv with a fresh CPU-only torch (no numpy, no CUDA), so
# TE's `parse(torch.version.cuda)` crashes with `TypeError: ... got 'NoneType'`.
# This is the upstream-acknowledged workaround tracked in
# https://github.com/NVIDIA/TransformerEngine/issues/1323 — disable isolation
# so TE builds against the resolved torch from the project venv.
no-build-isolation-package = ["transformer-engine-torch"]

# `block-sparse-attn` has the same need (its `setup.py` does `import torch`
# to compile a CUDA extension) but takes a different route. Listing it under
# `no-build-isolation-package` would also disable `extra-build-dependencies`
# for the package (https://github.com/astral-sh/uv/issues/16243). Instead,
# keep build isolation on and seed the isolated build env with the packages
# that `setup.py` imports at module load but aren't provided by the default
# PEP 517 build environment; `match-runtime = true` on torch picks up the
# CUDA-enabled torch resolved for the project venv.
[tool.uv.extra-build-dependencies]
block-sparse-attn = [
    { requirement = "torch", match-runtime = true },
    "psutil",
    "ninja",
]

# `block-sparse-attn` is git-sourced (override lives next to the dep
# declaration in `integrations/flashvsr/pyproject.toml`) and upstream ships
# no `pyproject.toml` / `PKG-INFO`, so without a hint uv would have to build
# it just to resolve the workspace -- which is the very build that needs the
# `extra-build-dependencies` above to succeed, and `match-runtime = true`
# requires static metadata to function. Declare the metadata upfront,
# mirroring the upstream `setup.py`'s `install_requires` and the `__version__`
# in `block_sparse_attn/__init__.py` (the `.post1` git tag is an
# `__init__.py` cleanup with no version bump), so uv skips the resolution-
# time build and defers to install time, when the build env is fully wired.
[[tool.uv.dependency-metadata]]
name = "block-sparse-attn"
version = "0.0.2"
requires-dist = ["torch", "einops"]

# The `transformer-engine-torch==2.14.0` sdist on PyPI is missing its
# `build_tools/` directory, so any from-source build (which is the only option
# since there is no prebuilt wheel) crashes inside setup.py with
# `ModuleNotFoundError: No module named 'build_tools'`. Tracked upstream in
# https://github.com/NVIDIA/TransformerEngine/issues/1567 — fixed after 2.14.0.
# Override the source to build from the v2.14.1 git tag, whose tree includes
# `build_tools/`. Inside the prebuilt flashdreams container TE is already
# installed system-wide, so this override is only exercised on host-side
# `uv sync` runs.
[tool.uv.sources]
transformer-engine-torch = { git = "https://github.com/NVIDIA/TransformerEngine.git", tag = "v2.14.1", subdirectory = "transformer_engine/pytorch" }

[tool.pyright]
extraPaths = [
    "flashdreams",
    "integrations/omnidreams",
    "integrations/omnidreams/ludus-renderer",
    # interactive-drive uses a src/ layout, so the extra-path points one level
    # deeper than the other (flat-layout) integration members.
    "integrations/omnidreams/samples/interactive-drive/src",
    "integrations/causal_forcing",
    "integrations/cosmos_predict2",
    "integrations/flashvsr",
    "integrations/fastvideo_causal_wan22",
    "integrations/lingbot",
    "integrations/self_forcing",
    "integrations/wan21",
]
# For pyright to pickup the correct python.
venvPath = "."
venv = ".venv"
# Mirror the ty rule `invalid-method-override = "ignore"` below.
reportIncompatibleMethodOverride = "none"
reportIncompatibleVariableOverride = "none"

[tool.ty.environment]
python-version = "3.12"
extra-paths = [
    "flashdreams",
    "integrations/omnidreams",
    "integrations/omnidreams/ludus-renderer",
    # interactive-drive uses a src/ layout, so the extra-path points one level
    # deeper than the other (flat-layout) integration members.
    "integrations/omnidreams/samples/interactive-drive/src",
    "integrations/causal_forcing",
    "integrations/cosmos_predict2",
    "integrations/flashvsr",
    "integrations/fastvideo_causal_wan22",
    "integrations/lingbot",
    "integrations/self_forcing",
    "integrations/wan21",
]

[tool.ty.src]
# Auto-generated protobuf stubs trigger `conflicting-metaclass` errors due to
# protobuf's EnumTypeWrapper pattern (known ty limitation).
exclude = [
    "**/protos/*pb2*",
]

[tool.ty.rules]
# Intentional pattern: integration subclasses override base methods with more specific
# signatures (violates Liskov but is the established design in this codebase).
invalid-method-override = "ignore"

[tool.ty.analysis]
# These packages have no useful type stubs (Triton kernels rewrite their
# call signatures via ``@triton.jit``) or are unavailable in CI; treat
# imports as Any.
replace-imports-with-any = ["transformer_engine.**", "triton.**"]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib -p flashdreams._pytest_plugins.marker_enforcement"
norecursedirs = [
    "parity_check",
    "baseline_fastvideo",
    "baseline_lightx2v",
    # The interactive-drive sample carries its own pytest config (with
    # ``gpu``/``xvfb`` markers instead of the workspace-wide
    # ``ci_cpu``/``ci_gpu``/``manual`` tiers) and is exercised via the
    # sample's own ``scripts/check.sh`` / ``uv run --package
    # omnidreams-interactive-drive pytest``. Skipping it here prevents the
    # workspace-wide marker_enforcement hook from rejecting every sample
    # test at collection time.
    "integrations/omnidreams/samples/interactive-drive/tests",
]
markers = [
    "ci_cpu: CPU-safe test, runs on the CPU CI runner",
    "ci_gpu: requires GPU or libGL (cv2), runs on the GPU CI runner",
    "manual: heavy or environment-specific test, opt-in only",
]

[dependency-groups]
lint = ["pre-commit>=4.3.0", "ty>=0.0.33"]

# Sphinx toolchain for building docs locally (`uv run --group docs sphinx-build ...`).
docs = [
    "furo",
    "sphinx",
    "sphinx-autobuild",
    "sphinx-copybutton",
    "sphinx-design",
]

# CPU-only runtime deps needed by autodoc to import flashdreams on CI.
# Heavy GPU packages (transformer-engine, pynvml, boto3, mediapy, cv2) are
# mocked via `autodoc_mock_imports` in docs/source/conf.py.
# CI installs: `uv sync --only-group docs --only-group docs-ci`
# then `uv pip install --no-deps ./flashdreams` to make the package importable.
docs-ci = [
    "einops>=0.7",
    "ftfy>=6.0",
    "huggingface-hub>=0.33",
    "loguru>=0.7",
    "numpy>=1.24",
    "safetensors>=0.4",
    "torch>=2.11",
    "torchvision>=0.22",
    "tqdm>=4.60",
    "transformers>=5.0,<6",
]
